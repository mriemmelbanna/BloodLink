{% extends "base.html" %}
{% block content %}

<style>

/* PAGE */
.page-container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#dc2626,#991b1b);
    color:white;
    padding:24px;
    border-radius:16px;
    margin-bottom:22px;
}

.title{
    font-size:24px;
    font-weight:700;
}

.subtitle{
    color:#f3f4f6;
    font-size:14px;
    margin-top:4px;
}

/* CARD */
.card{
    background:#ffffff;
    border-radius:16px;
    padding:24px;
    border:1px solid #b80000;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* FORM */
.form-group{
    margin-bottom:18px;
}

.form-label{
    display:block;
    font-size:14px;
    font-weight:600;
    color:#374151;
    margin-bottom:7px;
}

.form-input,
.form-select{
    width:100%;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    transition:.3s;
    background:#fff;
}

.form-input:focus,
.form-select:focus{
    outline:none;
    border-color:#dc2626;
    box-shadow:0 0 0 3px rgba(220,38,38,.12);
}

/* LOCATION */
.location-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.location-box input{
    flex:1;
}

/* BUTTONS */
.actions{
    display:flex;
    gap:12px;
    margin-top:22px;
    flex-wrap:wrap;
}

.btn{
    padding:11px 18px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    text-decoration:none;
    border:none;
}

.btn-primary{
    background:#dc2626;
    color:white;
}

.btn-primary:hover{
    background:#b91c1c;
}

.btn-secondary{
  background:#dc2626;
  color:white;
  border:none;
}

.btn-secondary:hover{
  background:#b91c1c;
}

/* RESPONSIVE */
@media(max-width:768px){

    .page-container{
        padding:14px;
    }

    .header{
        padding:18px;
    }

    .title{
        font-size:20px;
    }

    .actions{
        flex-direction:column;
    }

    .btn{
        width:100%;
        text-align:center;
    }

    .location-box{
        flex-direction:column;
    }
}

</style>

<div class="page-container">

    {% include "requests_app/patient_subnav.html" %}

    <!-- HEADER -->
    <div class="header">

        <div class="title">
            Edit Patient Profile
        </div>

        <div class="subtitle">
            Update your personal information and location
        </div>

    </div>

    <!-- CARD -->
    <div class="card">

        <form method="post">

            {% csrf_token %}

            <!-- FULL NAME -->
            <div class="form-group">

                <label class="form-label">
                    Full Name
                </label>

                <input type="text"
                       name="full_name"
                       value="{{ pprofile.full_name }}"
                       class="form-input"
                       placeholder="Enter full name">

            </div>

            <!-- PHONE -->
            <div class="form-group">

                <label class="form-label">
                    Phone
                </label>

                <input type="text"
                       name="phone"
                       value="{{ pprofile.phone }}"
                       class="form-input"
                       placeholder="e.g. 010xxxxxxxx">

            </div>

            <!-- CITY -->
            <div class="form-group">

                <label class="form-label">
                    City
                </label>

                <select name="city" class="form-select">

                    <option value="">
                        Select City
                    </option>

                    {% for value,label in egypt_cities %}

                        <option value="{{ value }}"
                        {% if pprofile.city == value %}selected{% endif %}>

                            {{ label }}

                        </option>

                    {% endfor %}

                </select>

            </div>

            <!-- ADDRESS -->
            <div class="form-group">

                <label class="form-label">
                    Address
                </label>

                <input type="text"
                       name="address"
                       value="{{ pprofile.address }}"
                       class="form-input"
                       placeholder="Enter address">

            </div>

            <!-- LOCATION -->
            <div class="form-group">

                <label class="form-label">
                    Location
                </label>

                <div class="location-box">

    <input type="hidden"
           id="latitude"
           name="latitude"
           value="{{ pprofile.latitude|default:'' }}">

    <input type="hidden"
           id="longitude"
           name="longitude"
           value="{{ pprofile.longitude|default:'' }}">

    <button type="button"
            class="btn btn-secondary"
            onclick="getLocation()">
        Get My Location
    </button>

</div>

              

            </div>

            <!-- BUTTONS -->
            <div class="actions">

                <button class="btn btn-primary">
                    Save Changes
                </button>

                <a href="{% url 'patient_profile' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

<script>
async function getLocation() {

    if (!navigator.geolocation) {
        alert("Geolocation is not supported.");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        async function(position) {

            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lon;

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`
                );

                const data = await response.json();

                const addressInput = document.querySelector('[name="address"]');
                const citySelect = document.querySelector('select[name="city"]');

                if (addressInput && data.display_name) {
                    addressInput.value = data.display_name;
                }

                const rawCity =
                    data.address.city ||
                    data.address.town ||
                    data.address.village ||
                    data.address.county ||
                    data.address.state ||
                    "";

                function normalizeCity(text) {
                    return text
                        .toLowerCase()
                        .replace("governorate", "")
                        .replace("محافظة", "")
                        .replace("al ", "")
                        .replace("el ", "")
                        .trim();
                }

                const cityMap = {
                    "cairo": "Cairo",
                    "qahirah": "Cairo",
                    "القاهرة": "Cairo",

                    "giza": "Giza",
                    "الجيزة": "Giza",

                    "alexandria": "Alexandria",
                    "الإسكندرية": "Alexandria",

                    "qalyubia": "Shubra El Kheima",
                    "shubra el kheima": "Shubra El Kheima",
                    "شبرا الخيمة": "Shubra El Kheima",

                    "port said": "Port Said",
                    "بورسعيد": "Port Said",

                    "suez": "Suez",
                    "السويس": "Suez",

                    "luxor": "Luxor",
                    "الأقصر": "Luxor",

                    "aswan": "Aswan",
                    "أسوان": "Aswan",

                    "asyut": "Asyut",
                    "assiut": "Asyut",
                    "أسيوط": "Asyut",

                    "dakahlia": "Mansoura",
                    "mansoura": "Mansoura",
                    "المنصورة": "Mansoura",

                    "gharbia": "Tanta",
                    "tanta": "Tanta",
                    "طنطا": "Tanta",

                    "sharqia": "Zagazig",
                    "zagazig": "Zagazig",
                    "الزقازيق": "Zagazig",

                    "ismailia": "Ismailia",
                    "الإسماعيلية": "Ismailia",

                    "faiyum": "Faiyum",
                    "fayoum": "Faiyum",
                    "الفيوم": "Faiyum",

                    "damietta": "Damietta",
                    "دمياط": "Damietta",

                    "minya": "Minya",
                    "المنيا": "Minya",

                    "beni suef": "Beni Suef",
                    "بني سويف": "Beni Suef",

                    "qena": "Qena",
                    "قنا": "Qena",

                    "sohag": "Sohag",
                    "سوهاج": "Sohag",

                    "red sea": "Hurghada",
                    "hurghada": "Hurghada",
                    "الغردقة": "Hurghada",

                    "south sinai": "Sharm El Sheikh",
                    "sharm el sheikh": "Sharm El Sheikh",
                    "شرم الشيخ": "Sharm El Sheikh"
                };

                const normalized = normalizeCity(rawCity);
                const finalCity = cityMap[normalized] || rawCity;

                if (citySelect && finalCity) {
                    let found = false;

                    for (let option of citySelect.options) {
                        if (
                            option.value.toLowerCase() === finalCity.toLowerCase() ||
                            option.text.toLowerCase() === finalCity.toLowerCase()
                        ) {
                            option.selected = true;
                            found = true;
                            break;
                        }
                    }

                    if (!found) {
                        alert("City detected: " + finalCity + " but it is not in the city list.");
                    }
                }

                alert("Location added successfully.");

            } catch (error) {
                alert("Location detected but address could not be loaded.");
            }
        },

        function() {
            alert("Please allow location access.");
        }
    );
}
</script>

{% endblock %}
