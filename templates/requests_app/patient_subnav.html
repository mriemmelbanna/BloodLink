<div class="flex flex-wrap gap-2 bg-white border rounded-xl p-2 mb-6">
  <a href="{% url 'patient_dashboard' %}"
     class="px-4 py-2 rounded-lg text-sm font-medium
     {% if active_tab == 'patient_dashboard' %} bg-red-600 text-white {% else %} hover:bg-gray-50 {% endif %}">
    <i class="fa-solid fa-chart-line mr-2"></i> Dashboard
  </a>

  <a href="{% url 'patient_profile' %}"
     class="px-4 py-2 rounded-lg text-sm font-medium
     {% if active_tab == 'patient_profile' %} bg-red-600 text-white {% else %} hover:bg-gray-50 {% endif %}">
    <i class="fa-regular fa-id-card mr-2"></i> Profile
  </a>

  <a href="{% url 'create_request' %}"
     class="px-4 py-2 rounded-lg text-sm font-medium
     {% if active_tab == 'create_request' %} bg-red-600 text-white {% else %} hover:bg-gray-50 {% endif %}">
    <i class="fa-solid fa-plus mr-2"></i> New Request
  </a>

  <a href="{% url 'patient-requests' %}"
     class="px-4 py-2 rounded-lg text-sm font-medium
     {% if active_tab == 'patient_requests' %} bg-red-600 text-white {% else %} hover:bg-gray-50 {% endif %}">
    <i class="fa-solid fa-list mr-2"></i> My Requests
  </a>
</div>
