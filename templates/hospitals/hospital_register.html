{% extends "base.html" %}

{% block title %}Hospital Registration{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-10 rounded shadow">
    <h2 class="text-3xl font-bold text-red-600 mb-4">Hospital Registration</h2>
    <p class="text-gray-600 mb-6">
        Register your hospital and help save lives. Please fill in all required information.
    </p>

    <form method="post">
        {% csrf_token %}
        
        <!-- Name -->
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-1">Hospital Name *</label>
            <input type="text" name="name" placeholder="Enter hospital name"
                   class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <!-- Email -->
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-1">Email *</label>
            <input type="email" name="email" placeholder="Enter your email"
                   class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <!-- Password -->
        <div class="mb-4 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Password *</label>
                <input type="password" name="password1" placeholder="Password"
                       class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">Confirm Password *</label>
                <input type="password" name="password2" placeholder="Confirm Password"
                       class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
        </div>

        <!-- Phone -->
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-1">Phone Number *</label>
            <input type="text" name="phone" placeholder="Enter phone number"
                   class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <!-- Address -->
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-1">Address *</label>
            <textarea name="address" placeholder="Enter hospital address"
                      class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500"></textarea>
        </div>

        <!-- City -->
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-1">City *</label>
            <input type="text" name="city" placeholder="Enter city"
                   class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        

        <!-- Terms -->
        <div class="mb-4">
            <label class="inline-flex items-center">
                <input type="checkbox" name="terms" class="form-checkbox text-red-600">
                <span class="ml-2 text-gray-600">I agree to the terms and confirm that this hospital is operating legally</span>
            </label>
        </div>

        <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700 text-lg">
            Register Hospital
        </button>
    </form>
</div>
{% endblock %}
