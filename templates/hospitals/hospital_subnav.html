<style>
/* =========================
   SUB NAV STYLE
========================= */

.subnav {
    background: #ffffff;
    border: 1px solid #b80000;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 20px;

    display: flex;
    flex-wrap: wrap;
    gap: 10px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.subnav-link {
    padding: 8px 14px;
    border-radius: 8px;

    font-size: 14px;
    font-weight: 500;
    text-decoration: none;

    color: #333;

    display: flex;
    align-items: center;
    gap: 6px;

    transition: all 0.2s ease;
}

/* Hover */
.subnav-link:hover {
    background: #f3f4f6;
    transform: translateY(-1px);
}

/* Active */
.subnav-link.active {
    background: #dc2626;
    color: white;
}

/* Icons */
.icon {
    font-size: 14px;
    color: #e41212;
}

/* Active icon */
.subnav-link.active .icon {
    color: white;
}

/* =========================
   MOBILE
========================= */
@media (max-width: 768px) {
    .subnav {
        flex-direction: column;
        gap: 6px;
    }

    .subnav-link {
        width: 100%;
    }
}
</style>


<div class="subnav">
